<!-- @dsCard group="Components" viewport="700x260" name="Text Fields & Selection Controls" subtitle="Filled/outlined inputs, switch, checkbox, radio, slider, segmented button" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--md-sys-color-surface); font-family: var(--md-sys-typescale-font-plain); }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 16px; margin-bottom: 18px; }
  .label { width: 100%; font-size: 11px; letter-spacing: .5px; text-transform: uppercase; color: var(--md-sys-color-on-surface-variant); margin: 4px 0 0; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { TextField, Switch, Checkbox, RadioButton, Slider, SegmentedButton } = window.Material3DesignSystem_fd173f;
  function Demo() {
    return (
      <React.Fragment>
        <p className="label">Text fields</p>
        <div className="row">
          <TextField label="이메일" leadingIcon="mail" supportingText="회사 이메일" />
          <TextField variant="outlined" label="비밀번호" trailingIcon="visibility" />
          <TextField label="이름" error supportingText="필수 항목입니다" />
        </div>
        <p className="label">Selection controls</p>
        <div className="row">
          <Switch defaultChecked icon ariaLabel="Wi-Fi" />
          <Switch ariaLabel="블루투스" />
          <Checkbox label="동의합니다" defaultChecked />
          <Checkbox indeterminate label="전체" />
          <RadioButton name="r" label="무료" defaultChecked />
          <RadioButton name="r" label="프로" />
        </div>
        <p className="label">Slider · Segmented button</p>
        <div className="row">
          <Slider defaultValue={60} showValue style={{ flex: 1, minWidth: '180px' }} />
          <SegmentedButton segments={[{value:'d',label:'일'},{value:'w',label:'주'},{value:'m',label:'월'}]} defaultValue="w" />
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
