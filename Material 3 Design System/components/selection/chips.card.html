<!-- @dsCard group="Components" viewport="700x180" name="Chips" subtitle="Assist, filter, input, suggestion — outlined & elevated" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--md-sys-color-surface); font-family: var(--md-sys-typescale-font-plain); }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-bottom: 14px; }
  .label { width: 100%; font-size: 11px; letter-spacing: .5px; text-transform: uppercase; color: var(--md-sys-color-on-surface-variant); margin: 4px 0 0; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Chip } = window.Material3DesignSystem_fd173f;
  function Demo() {
    return (
      <React.Fragment>
        <p className="label">Assist & suggestion</p>
        <div className="row">
          <Chip type="assist" icon="event" label="일정 추가" />
          <Chip type="assist" icon="directions" label="길찾기" />
          <Chip type="suggestion" label="추천 검색어" />
          <Chip type="assist" icon="bookmark" label="저장" elevated />
        </div>
        <p className="label">Filter (toggle)</p>
        <div className="row">
          <Chip type="filter" label="무료배송" selected />
          <Chip type="filter" label="당일배송" />
          <Chip type="filter" label="별점 4.5+" selected />
          <Chip type="filter" label="할인중" />
        </div>
        <p className="label">Input (removable)</p>
        <div className="row">
          <Chip type="input" icon="person" label="김민준" removable />
          <Chip type="input" icon="person" label="이서연" removable />
          <Chip type="input" label="디자인" removable />
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
