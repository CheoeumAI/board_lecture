<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>M3 클래스 — Material Design 3 마스터클래스</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--md-sys-color-surface);
    color: var(--md-sys-color-on-surface);
    font-family: var(--md-sys-typescale-font-plain);
    min-height: 100vh;
  }
  a { color: inherit; }
  .theme-toggle {
    position: fixed; right: 20px; bottom: 20px; z-index: 50;
  }
  #snackbar-host {
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%); z-index: 200;
  }
</style>
</head>
<body>
<div id="root"></div>
<div id="snackbar-host"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="Sections.jsx"></script>
<script type="text/babel">
  const { Dialog, Switch, Snackbar, TextField, IconButton } = window.Material3DesignSystem_fd173f;
  const { SiteHeader, Hero, Features, Curriculum, PricingCta, SiteFooter } = window.MarketingSections;

  function App() {
    const [dark, setDark] = React.useState(false);
    const [enrollOpen, setEnrollOpen] = React.useState(false);
    const [toast, setToast] = React.useState(false);

    React.useEffect(() => {
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    }, [dark]);

    const enroll = () => setEnrollOpen(true);
    const confirm = () => { setEnrollOpen(false); setToast(true); setTimeout(() => setToast(false), 3200); };

    return (
      <React.Fragment>
        <SiteHeader onCta={enroll} />
        <Hero onCta={enroll} />
        <Features />
        <Curriculum />
        <PricingCta onCta={enroll} />
        <SiteFooter />

        <div className="theme-toggle" style={{ display: 'flex', alignItems: 'center', gap: '8px', background: 'var(--md-sys-color-surface-container-high)', padding: '8px 16px', borderRadius: '999px', boxShadow: 'var(--md-sys-elevation-2)' }}>
          <span className="m3-icon" style={{ fontSize: '20px', color: 'var(--md-sys-color-on-surface-variant)' }}>{dark ? 'dark_mode' : 'light_mode'}</span>
          <Switch checked={dark} onChange={setDark} ariaLabel="다크 모드" />
        </div>

        <Dialog open={enrollOpen} icon="school" headline="수강 신청"
          confirmText="신청 완료" cancelText="취소"
          onConfirm={confirm} onCancel={() => setEnrollOpen(false)} onClose={() => setEnrollOpen(false)}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
            <span>아래 정보를 입력하면 8주 과정 수강이 시작됩니다.</span>
            <TextField label="이름" leadingIcon="person" style={{ width: '100%' }} />
            <TextField label="이메일" leadingIcon="mail" style={{ width: '100%' }} />
          </div>
        </Dialog>

        {toast && ReactDOM.createPortal(
          <Snackbar message="수강 신청이 완료되었습니다 🎉" actionLabel="확인" onAction={() => setToast(false)} />,
          document.getElementById('snackbar-host')
        )}
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
