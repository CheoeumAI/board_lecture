<!-- @dsCard group="Slides" viewport="1280x720" name="Content slide" subtitle="Headline + supporting points with icons" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; }
  .slide {
    width: 1280px; height: 720px; box-sizing: border-box;
    background: var(--md-sys-color-surface);
    color: var(--md-sys-color-on-surface);
    font-family: var(--md-sys-typescale-font-plain);
    padding: 80px 96px; position: relative; overflow: hidden;
  }
  .eyebrow { font-size: 20px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: var(--md-sys-color-primary); }
  h2 { margin: 12px 0 0; font-size: 56px; line-height: 1.1; font-weight: 400; letter-spacing: -0.5px; max-width: 22ch; }
  .points { display: flex; flex-direction: column; gap: 20px; margin-top: 48px; }
  .point { display: flex; gap: 20px; align-items: flex-start; }
  .ic { width: 56px; height: 56px; flex-shrink: 0; border-radius: 16px; background: var(--md-sys-color-secondary-container); color: var(--md-sys-color-on-secondary-container); display: flex; align-items: center; justify-content: center; }
  .ic .m3-icon { font-size: 30px; }
  .pt-t { font-size: 26px; font-weight: 500; }
  .pt-d { font-size: 21px; line-height: 1.45; color: var(--md-sys-color-on-surface-variant); margin-top: 2px; max-width: 64ch; }
  .footer { position: absolute; bottom: 48px; left: 96px; right: 96px; display: flex; justify-content: space-between; font-size: 18px; color: var(--md-sys-color-on-surface-variant); border-top: 1px solid var(--md-sys-color-outline-variant); padding-top: 16px; }
</style>
</head>
<body>
<section class="slide" data-screen-label="Content">
  <span class="eyebrow">색상 시스템</span>
  <h2>시스템 색상은 세 겹으로 동작합니다</h2>
  <div class="points">
    <div class="point">
      <span class="ic"><span class="m3-icon">looks_one</span></span>
      <div><div class="pt-t">레퍼런스 톤 팔레트</div><div class="pt-d">시드 색상에서 0–100까지 13단계의 톤을 추출합니다. 모든 색의 원천입니다.</div></div>
    </div>
    <div class="point">
      <span class="ic"><span class="m3-icon">looks_two</span></span>
      <div><div class="pt-t">시스템 색상 역할</div><div class="pt-d">primary, surface, error처럼 의미 기반 역할에 톤을 매핑합니다.</div></div>
    </div>
    <div class="point">
      <span class="ic"><span class="m3-icon">looks_3</span></span>
      <div><div class="pt-t">on- 색상 페어링</div><div class="pt-d">각 색상 위에 올라가는 텍스트·아이콘 색을 항상 함께 정의해 대비를 보장합니다.</div></div>
    </div>
  </div>
  <div class="footer"><span>Material Design 3 · 강의</span><span>03</span></div>
</section>
</body>
</html>
