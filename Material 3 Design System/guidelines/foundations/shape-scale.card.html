<!-- @dsCard group="Spacing" viewport="700x160" name="Shape scale (corner radius)" subtitle="None → Full, the M3 rounding system" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--md-sys-color-surface); font-family: var(--md-sys-typescale-font-plain); color: var(--md-sys-color-on-surface); }
  .row { display: flex; gap: 18px; align-items: flex-start; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 72px; height: 72px; background: var(--md-sys-color-primary-container); border: 1px solid var(--md-sys-color-outline-variant); }
  .v { font-size: 11px; color: var(--md-sys-color-on-surface-variant); text-align: center; }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="box" style="border-radius:var(--md-sys-shape-corner-none)"></div><span class="v">None · 0</span></div>
  <div class="item"><div class="box" style="border-radius:var(--md-sys-shape-corner-extra-small)"></div><span class="v">XS · 4</span></div>
  <div class="item"><div class="box" style="border-radius:var(--md-sys-shape-corner-small)"></div><span class="v">S · 8</span></div>
  <div class="item"><div class="box" style="border-radius:var(--md-sys-shape-corner-medium)"></div><span class="v">M · 12</span></div>
  <div class="item"><div class="box" style="border-radius:var(--md-sys-shape-corner-large)"></div><span class="v">L · 16</span></div>
  <div class="item"><div class="box" style="border-radius:var(--md-sys-shape-corner-extra-large)"></div><span class="v">XL · 28</span></div>
  <div class="item"><div class="box" style="border-radius:var(--md-sys-shape-corner-full)"></div><span class="v">Full</span></div>
</div>
</body>
</html>
