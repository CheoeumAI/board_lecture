<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation levels" subtitle="Levels 0–5 — shadow depth for surfaces" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 28px 24px; background: var(--md-sys-color-surface-container-lowest); font-family: var(--md-sys-typescale-font-plain); color: var(--md-sys-color-on-surface); }
  .row { display: flex; gap: 24px; align-items: flex-start; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 80px; height: 64px; border-radius: 12px; background: var(--md-sys-color-surface); display: flex; align-items: center; justify-content: center; font-weight: 500; }
  .v { font-size: 11px; color: var(--md-sys-color-on-surface-variant); }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="box md-elevation-0">0</div><span class="v">0dp</span></div>
  <div class="item"><div class="box md-elevation-1">1</div><span class="v">1dp</span></div>
  <div class="item"><div class="box md-elevation-2">2</div><span class="v">3dp</span></div>
  <div class="item"><div class="box md-elevation-3">3</div><span class="v">6dp</span></div>
  <div class="item"><div class="box md-elevation-4">4</div><span class="v">8dp</span></div>
  <div class="item"><div class="box md-elevation-5">5</div><span class="v">12dp</span></div>
</div>
</body>
</html>
