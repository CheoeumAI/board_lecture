<!-- @dsCard group="Colors" viewport="700x150" name="Primary tonal palette" subtitle="Reference tones 0–100 generated from seed #6750A4" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--md-sys-color-surface); font-family: var(--md-sys-typescale-font-plain); }
  .pal { display: flex; border-radius: 8px; overflow: hidden; }
  .sw { flex: 1; height: 72px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; font-size: 10px; font-weight: 500; }
  .label { font-size: 11px; letter-spacing: .5px; text-transform: uppercase; color: var(--md-sys-color-on-surface-variant); margin: 0 0 8px; }
</style>
</head>
<body>
<p class="label">Primary</p>
<div class="pal">
  <div class="sw" style="background:var(--md-ref-primary-10);color:#fff">10</div>
  <div class="sw" style="background:var(--md-ref-primary-20);color:#fff">20</div>
  <div class="sw" style="background:var(--md-ref-primary-30);color:#fff">30</div>
  <div class="sw" style="background:var(--md-ref-primary-40);color:#fff">40</div>
  <div class="sw" style="background:var(--md-ref-primary-50);color:#fff">50</div>
  <div class="sw" style="background:var(--md-ref-primary-60);color:#fff">60</div>
  <div class="sw" style="background:var(--md-ref-primary-70);color:#000">70</div>
  <div class="sw" style="background:var(--md-ref-primary-80);color:#000">80</div>
  <div class="sw" style="background:var(--md-ref-primary-90);color:#000">90</div>
  <div class="sw" style="background:var(--md-ref-primary-95);color:#000">95</div>
  <div class="sw" style="background:var(--md-ref-primary-99);color:#000">99</div>
</div>
</body>
</html>
